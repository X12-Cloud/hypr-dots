# Sources
source = ./hyprland/legacy/general.conf
source = ./hyprland/legacy/keybinds.conf
source = ./hyprland/legacy/monitors.conf
source = ./hyprland/legacy/env.conf
source = ./hyprland/legacy/windows.conf

###################
### MY PROGRAMS ###
###################
$terminal = foot
$fileManager = nautilus
$menu = ~/.config/rofi/run.sh norm 1 1
$qs = quickshell

#################
### AUTOSTART ###
#################
exec-once = $qs
exec-once = awww-daemon
exec = "awww img /home/x12/Pictures/sunset-lake-mountain-sky-scenery-digital-art-4k-wallpaper-uhdpaper.com-908@0@i.jpg" # any img u want
exec-once = "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1"
# exec-once = $terminal

